name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile backend
        run: |
          cd backend
          python -m compileall app scripts
      - name: Run backend tests
        run: |
          cd backend
          pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: |
          cd frontend
          npm ci
      - name: Lint frontend
        run: |
          cd frontend
          npm run lint
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious private files and secrets
        run: |
          test ! -f .env
          test ! -f frontend/.env.local
          ! find . -path './.git' -prune -o -type f \( -name '*.ged' -o -name '*.GED' -o -name '*.zip' \) -not -path './examples/*' -print | grep .
          ! grep -R --line-number -E 'sk-or-v1-|Brown Family Tree|Family Tree by GB' . --exclude-dir=.git --exclude=ci.yml
